<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FOTU - Shop</title>
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
        <link rel="stylesheet" href="../css/main.css" />
        <link rel="stylesheet" href="../css/shop.css" />
        <link rel="stylesheet" href="../css/basket.css" />
    </head>
    <body>
        <main class="shop-main">
            <header class="shop-header">
                <input
                    type="search"
                    class="shop-search"
                    id="shopSearch"
                    placeholder="SEARCH"
                    autocomplete="off"
                    aria-label="Search products" />
            </header>
            <section class="shop-grid" id="shopGridActive"></section>
            <header class="shop-section-divider" id="shopSoldOutHeader" hidden>
                <h2 class="shop-section-title">Sold out</h2>
            </header>
            <section class="shop-grid" id="shopGridArchived"></section>
            <p class="shop-empty" id="shopEmpty" hidden>No products match your search.</p>
        </main>

        <script src="../js/components/Navbar.js"></script>
        <script src="../js/components/Basket.js"></script>
        <script src="../js/components/BasketDrawer.js"></script>
        <script src="../js/main.js"></script>
        <script src="../js/components/ShopifyStore.js"></script>
    </body>
</html>
