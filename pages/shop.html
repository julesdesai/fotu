<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FOTU - Shop</title>
        <link rel="stylesheet" href="../css/main.css" />
        <link rel="stylesheet" href="../css/shop.css" />
        <link rel="stylesheet" href="../css/basket.css" />
    </head>
    <body>
        <main class="shop-main">
            <header class="shop-header">
                <input
                    type="search"
                    class="shop-search"
                    id="shopSearch"
                    placeholder="SEARCH"
                    autocomplete="off"
                    aria-label="Search products" />
            </header>
            <section class="shop-grid"></section>
            <p class="shop-empty" id="shopEmpty" hidden>No products match your search.</p>
        </main>

        <script src="../js/components/Navbar.js"></script>
        <script src="../js/components/Basket.js"></script>
        <script src="../js/components/BasketDrawer.js"></script>
        <script src="../js/main.js"></script>
        <script src="../js/components/ShopifyStore.js"></script>
    </body>
</html>
