<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FOTU - Fabric of the Universe</title>
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/home.css" />
    </head>
    <body>
        <main>
            <section class="hero-fullscreen">
                <div class="hero-typewriter-left"></div>
                <div class="hero-typewriter-right"></div>
                <div class="hero-image">
                    <video
                        class="morph-gallery-video"
                        autoplay
                        muted
                        loop

                            src="assets/gallery/hero-gallery.mp4"
                            type="video/mp4"
                        />
                    </video>
                </div>
                <div class="hero-overlay">
                    <!-- FOTU text now rendered as negative space in particle gallery -->
                </div>
                <div class="hero-credit">
                    <p>
                        Website by Sea Elegans<br />in collaboration with FOTU
                    </p>
                    <p>&copy; FOTU 2026</p>
                </div>
            </section>
        </main>

        <script src="js/components/Navbar.js"></script>

        <script src="js/components/HeroTypewriters.js"></script>
        <script src="js/main.js"></script>
    </body>
